<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Etiquetas de Garantía</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .form-container {
            max-width: 600px;
            margin: 2rem auto;
            padding: 1rem;
        }
        .preview-container {
            max-width: 600px;
            margin: 2rem auto;
            padding: 1rem;
            text-align: center;
        }
        .preview-container img {
            max-width: 100%;
            height: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        @media print {
            .no-print {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-container no-print">
            <h1 class="text-center mb-4">Generador de Etiquetas</h1>
            <form id="labelForm">
                <div class="mb-3">
                    <label for="cliente" class="form-label">Cliente:</label>
                    <input type="text" class="form-control" id="cliente" required>
                </div>
                <div class="mb-3">
                    <label for="imei" class="form-label">IMEI/SN:</label>
                    <input type="text" class="form-control" id="imei" required>
                </div>
                <div class="mb-3">
                    <label for="fecha" class="form-label">Fecha:</label>
                    <input type="date" class="form-control" id="fecha" required>
                </div>
                <div class="mb-3">
                    <label for="problema" class="form-label">Problema:</label>
                    <textarea class="form-control" id="problema" rows="3" required></textarea>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary">Generar e Imprimir</button>
                </div>
            </form>
            <div id="status" class="alert mt-3" style="display: none;"></div>
        </div>
        
        <div id="previewContainer" class="preview-container" style="display: none;">
            <h3>Vista Previa</h3>
            <div id="pdfPreview"></div>
            <div class="mt-3">
                <button id="printBtn" class="btn btn-success me-2">Imprimir</button>
                <button id="newLabelBtn" class="btn btn-secondary">Nueva Etiqueta</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        // Configurar PDF.js
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        
        let currentPdfPath = null;

        // Configurar la fecha actual por defecto
        document.addEventListener('DOMContentLoaded', () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('fecha').value = today;
        });

        document.getElementById('labelForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const status = document.getElementById('status');
            
            const data = {
                cliente: document.getElementById('cliente').value,
                imei: document.getElementById('imei').value,
                fecha: document.getElementById('fecha').value,
                problema: document.getElementById('problema').value
            };

            try {
                const response = await fetch('/api/generate-label', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                
                if (result.status === 'success') {
                    currentPdfPath = result.pdf_path;
                    await showPdfPreview(result.pdf_path);
                    
                    // Ocultar el formulario y mostrar la vista previa
                    document.querySelector('.form-container').style.display = 'none';
                    document.getElementById('previewContainer').style.display = 'block';
                    
                    status.style.display = 'none';
                } else {
                    status.className = 'alert alert-danger';
                    status.textContent = result.message;
                    status.style.display = 'block';
                }
            } catch (error) {
                status.className = 'alert alert-danger';
                status.textContent = 'Error: ' + error.message;
                status.style.display = 'block';
            }
        });

        async function showPdfPreview(pdfPath) {
            const loadingTask = pdfjsLib.getDocument(pdfPath);
            try {
                const pdf = await loadingTask.promise;
                const page = await pdf.getPage(1);
                const scale = 1.5;
                const viewport = page.getViewport({ scale });

                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                const renderContext = {
                    canvasContext: context,
                    viewport: viewport
                };

                await page.render(renderContext).promise;

                const previewDiv = document.getElementById('pdfPreview');
                previewDiv.innerHTML = '';
                previewDiv.appendChild(canvas);
            } catch (error) {
                console.error('Error al mostrar la vista previa:', error);
            }
        }

        // Botón de impresión
        document.getElementById('printBtn').addEventListener('click', async () => {
            if (currentPdfPath) {
                try {
                    const response = await fetch('/api/print', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ pdf_path: currentPdfPath })
                    });
                    
                    const result = await response.json();
                    const status = document.getElementById('status');
                    status.className = 'alert alert-success';
                    status.textContent = result.message;
                    status.style.display = 'block';
                } catch (error) {
                    console.error('Error al imprimir:', error);
                }
            }
        });

        // Botón de nueva etiqueta
        document.getElementById('newLabelBtn').addEventListener('click', () => {
            document.getElementById('labelForm').reset();
            document.querySelector('.form-container').style.display = 'block';
            document.getElementById('previewContainer').style.display = 'none';
            document.getElementById('status').style.display = 'none';
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('fecha').value = today;
        });
    </script>
</body>
</html>
